<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gestionnaire de projets</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="../assets/compos/tag.js"></script>
    <script src="../assets/compos/project-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/column-title.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content">
        <div class="topbar">
          <div class="topbar-left">
            <a href="dashboard.html" class="back-link" @click.prevent="goBack">
              <i class="bi bi-arrow-left"></i> Retour
            </a>
            <h3 class="mb-0">{{ workspace.name }}</h3>
          </div>
        </div>

        <div class="workspace-detail" v-if="workspace">
          <div class="detail-card">
            <h4>Description</h4>
            <p>{{ workspace.description || "Aucune description" }}</p>
          </div>
        </div>
        <div class="loading" v-else-if="loading">Chargement...</div>
        <div class="loading" v-else>Projet introuvable</div>
      </main>
    </div>

    <style>
      .back-link {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #6c63ff;
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        margin-bottom: 8px;
        cursor: pointer;
      }
      .back-link:hover {
        color: #5a52e0;
      }
      .workspace-detail {
        background: white;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      }
      .detail-card h4 {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 12px;
        color: #333;
      }
      .detail-card p {
        font-size: 14px;
        color: #555;
        line-height: 1.6;
        margin: 0;
      }
      .loading {
        text-align: center;
        padding: 60px 20px;
        font-size: 16px;
        color: #888;
      }
    </style>

    <script>
      new Vue({
        el: "#app",
        data: {
          workspace: null,
          loading: true,
        },
        async mounted() {
          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");
          if (id) {
            try {
              this.workspace = await window.electronAPI.getWorkspace(Number(id));
            } catch (e) {
              console.error(e);
            }
          }
          this.loading = false;
        },
        methods: {
          goBack() {
            window.electronAPI.navigate("dashboard.html");
          },
        },
      });
    </script>
  </body>
</html>
