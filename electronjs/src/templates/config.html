<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Configuration</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/comp-logo.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content" style="background: #f5f6fa;">
        <button onclick="window.history.back()" class="gohome btn custom-orange d-flex align-items-center justify-content-center shadow-lg clicked">
          <i class="bi bi-arrow-left me-2"></i> Retour
        </button>

        <div class="config-page" style="max-width:600px;margin:40px auto;background:white;border-radius:16px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <h3 style="margin-bottom:24px;color:#1d2340;">
            <i class="bi bi-gear"></i> Configuration
          </h3>

          <div class="form-group">
            <label>URL du serveur</label>
            <input type="text" v-model="serverUrl" placeholder="http://localhost:5000" style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;" />
            <small style="color:#9ca3af;margin-top:6px;display:block;">Adresse du backend Flask</small>
          </div>

          <div style="margin-top:20px;display:flex;gap:10px;">
            <button @click="saveConfig" class="btn-submit" :disabled="saving">
              {{ saving ? "Enregistrement..." : "Enregistrer" }}
            </button>
            <button @click="testConnection" class="btn-cancel" :disabled="testing">
              {{ testing ? "Test..." : "Tester la connexion" }}
            </button>
          </div>

          <div v-if="message" :class="'alert ' + (messageType === 'success' ? 'alert-success' : 'alert-danger')" style="margin-top:16px;">
            {{ message }}
          </div>
        </div>
      </main>
    </div>

    <script>
      new Vue({
        el: "#app",
        data: {
          serverUrl: "http://localhost:5000",
          saving: false,
          testing: false,
          message: "",
          messageType: "",
        },
        async mounted() {
          const config = await window.electronAPI.getConfig();
          if (config && config.serverUrl) {
            this.serverUrl = config.serverUrl;
          }
        },
        methods: {
          async saveConfig() {
            this.saving = true;
            this.message = "";
            try {
              const result = await window.electronAPI.saveConfig({ serverUrl: this.serverUrl });
              if (result.success) {
                this.message = "Configuration enregistree. Redemarrez l'application pour appliquer les changements.";
                this.messageType = "success";
              } else {
                this.message = result.error || "Erreur lors de l'enregistrement";
                this.messageType = "error";
              }
            } catch (e) {
              this.message = e.message;
              this.messageType = "error";
            } finally {
              this.saving = false;
            }
          },
          async testConnection() {
            this.testing = true;
            this.message = "";
            try {
              const res = await fetch(this.serverUrl + "/howmanyusers");
              if (res.ok) {
                this.message = "Connexion reussie! Serveur accessible.";
                this.messageType = "success";
              } else {
                this.message = "Serveur repond mais avec une erreur: " + res.status;
                this.messageType = "error";
              }
            } catch (e) {
              this.message = "Impossible de se connecter au serveur: " + e.message;
              this.messageType = "error";
            } finally {
              this.testing = false;
            }
          },
        },
      });
    </script>
  </body>
</html>
