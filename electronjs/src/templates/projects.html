<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projets</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/projects.css" />

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/comp-logo.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content projects-page">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Projets</h3>
          </div>
          <div class="topbar-right">
            <button class="new-task clicked" @click="openNewProject">
              <i class="bi bi-plus-lg"></i> Nouveau projet
            </button>
          </div>
        </div>

        <div v-if="loading" class="text-center my-5">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Chargement...</span>
          </div>
        </div>

        <div v-else-if="projects.length" class="projects-grid">
          <div
            v-for="(proj, i) in projects"
            :key="proj.id"
            class="project-card-large"
            :class="{ 'project-locked': !proj.isMember }"
            @click="proj.isMember && goToProject(proj.id)"
          >
            <div class="project-card-icon" :style="{ background: colors[i % colors.length] }">
              <i class="bi" :class="proj.isMember ? 'bi-folder' : 'bi-lock'"></i>
            </div>
            <h4 class="project-card-name">{{ proj.name }}</h4>
            <p class="project-card-desc">{{ proj.description || "Aucune description" }}</p>
            <div class="project-card-stats">
              <span><i class="bi bi-check2-square"></i> {{ proj.taskCount || 0 }} taches</span>
              <span><i class="bi bi-people"></i> {{ proj.memberCount || 0 }} membres</span>
            </div>
            <div class="project-stats-dots" v-if="proj.isMember && proj.taskStats" style="opacity:0.6;">
              <span
                v-for="s in proj.taskStats"
                :key="s.status"
                class="stat-dot"
                :style="{ background: s.color, width: s.pct + '%' }"
                :title="s.status === 'todo' ? 'A faire' : s.status === 'in_progress' ? 'En cours' : 'Termine'"
              ></span>
            </div>
            <div v-if="!proj.isMember" class="project-card-actions">
              <button class="btn-join" @click.stop="requestJoin(proj)" :disabled="proj.requestSent">
                {{ proj.requestSent ? "Demandee" : "Rejoindre" }}
              </button>
            </div>
          </div>
        </div>

        <div v-else class="text-center my-5 py-5">
          <i class="bi bi-folder" style="font-size: 48px; color: #ccc; display: block; margin-bottom: 12px;"></i>
          <p class="text-muted">Aucun projet pour le moment</p>
        </div>
      </main>

      <div class="modal-overlay" v-if="showModal" @click.self="showModal = false">
        <div class="modal-box dashboard-modal">
          <h4>Nouveau projet</h4>
          <div class="modal-form-row">
            <div class="form-group">
              <label>Nom du projet</label>
              <input type="text" v-model="newProject.name" placeholder="Entrez le nom" />
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea v-model="newProject.description" placeholder="Description" rows="3"></textarea>
            </div>
          </div>
          <div class="error-msg" v-if="projectError">{{ projectError }}</div>
          <div class="modal-actions">
            <button class="btn-cancel" @click="showModal = false">Annuler</button>
            <button class="btn-submit" @click="createProject" :disabled="!newProject.name || projectLoading">
              {{ projectLoading ? "Creation..." : "Creer" }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      new Vue({
        el: "#app",
        data: {
          projects: [],
          loading: true,
          showModal: false,
          projectLoading: false,
          projectError: "",
          newProject: { name: "", description: "" },
          colors: ["#ff9838", "#2ecc71", "#3498db", "#e74c3c", "#9b59b6", "#1abc9c"],
          session: null,
        },
        async mounted() {
          this.session = (await window.electronAPI.checkSession()) || { loggedIn: false };
          await this.fetchProjects();
        },
        methods: {
          async fetchProjects() {
            this.loading = true;
            try {
              const userId = this.session.loggedIn && this.session.user ? this.session.user.id : null;
              const [workspaces, tasks, myWorkspaces] = await Promise.all([
                window.electronAPI.getWorkspaces(),
                window.electronAPI.getTasks(),
                userId ? window.electronAPI.getMyWorkspaces(userId) : Promise.resolve([]),
              ]);
              const myWsIds = new Set((myWorkspaces || []).map(w => w.id));
              this.projects = await Promise.all(workspaces.map(async (ws) => {
                const isMember = myWsIds.has(ws.id);
                let memberCount = 0;
                let wsTasks = [];
                if (isMember) {
                  try {
                    const members = await window.electronAPI.getWorkspaceMembers(ws.id);
                    memberCount = members.length;
                    wsTasks = await window.electronAPI.getWorkspaceTasks(ws.id) || [];
                  } catch {}
                }
                const taskCounts = { todo: 0, in_progress: 0, done: 0 };
                wsTasks.forEach(t => { if (taskCounts[t.status] !== undefined) taskCounts[t.status]++; });
                const total = wsTasks.length || 1;
                return {
                  id: ws.id,
                  name: ws.name,
                  description: ws.description,
                  taskCount: wsTasks.length,
                  memberCount,
                  isMember,
                  requestSent: false,
                  taskStats: [
                    { status: 'todo', pct: (taskCounts.todo / total) * 100, color: '#f59e0b' },
                    { status: 'in_progress', pct: (taskCounts.in_progress / total) * 100, color: '#3b82f6' },
                    { status: 'done', pct: (taskCounts.done / total) * 100, color: '#22c55e' },
                  ],
                };
              }));
            } catch (e) {
              console.error("Error fetching projects:", e);
            } finally {
              this.loading = false;
            }
          },
          goToProject(id) {
            if (id) {
              window.electronAPI.navigate("workspace.html?id=" + id);
            }
          },
          openNewProject() {
            this.newProject = { name: "", description: "" };
            this.projectError = "";
            this.showModal = true;
          },
          async createProject() {
            this.projectError = "";
            this.projectLoading = true;
            try {
              const session = this.session;
              const ownerId = session.loggedIn && session.user ? session.user.id : null;
              const result = await window.electronAPI.createWorkspace({
                name: this.newProject.name,
                description: this.newProject.description || "Aucune description",
                ownerId,
              });
              if (result && result.error) {
                this.projectError = result.error;
                return;
              }
              this.showModal = false;
              await this.fetchProjects();
            } catch (e) {
              this.projectError = "Erreur de connexion au serveur";
              console.error(e);
            } finally {
              this.projectLoading = false;
            }
          },
          async requestJoin(proj) {
            const userId = this.session.loggedIn && this.session.user ? this.session.user.id : null;
            if (!userId) return;
            try {
              const result = await window.electronAPI.sendJoinRequest(proj.id, userId);
              if (result && !result.error) {
                proj.requestSent = true;
              } else {
                alert(result.error || "Erreur");
              }
            } catch (e) {
              console.error(e);
            }
          },
        },
      });
    </script>
  </body>
</html>
