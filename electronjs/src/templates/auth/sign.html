<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription</title>
    <link rel="stylesheet" href="../../assets/css/all.css" />
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/sign.css" />
  </head>
  <body>
    <div class="auth-container" id="app">
      <div class="auth-logo">
        <div class="logo-circle"></div>
        <h4>ProjectManager</h4>
      </div>

      <div class="auth-title">
        {{ step === 'account' ? 'Inscription' : 'Votre profil' }}
      </div>
      <div class="auth-subtitle">{{ subtitle }}</div>

      <div class="error-msg" :class="{ show: error }">{{ error }}</div>

      <form v-if="step === 'account'" @submit.prevent="signup">
        <div class="auth-form-grid">
          <div class="form-group">
            <label for="name">Nom complet</label>
            <input
              type="text"
              id="name"
              v-model="name"
              placeholder="Entrez votre nom complet"
              required
            />
          </div>
          <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input
              type="text"
              id="username"
              v-model="username"
              @blur="checkUsername"
              placeholder="Choisissez un nom d'utilisateur"
              :class="{ 'is-invalid': usernameTaken }"
              required
            />
            <small v-if="usernameTaken" class="field-error">Ce nom d'utilisateur est deja pris</small>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              v-model="email"
              @blur="checkEmail"
              placeholder="Entrez votre email"
              :class="{ 'is-invalid': emailTaken }"
              required
            />
            <small v-if="emailTaken" class="field-error">Cet email est deja utilise</small>
          </div>
          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              v-model="password"
              placeholder="Minimum 6 caracteres"
              required
            />
          </div>
          <div class="form-group full-width">
            <label for="confirmPassword">Confirmer le mot de passe</label>
            <input
              type="password"
              id="confirmPassword"
              v-model="confirmPassword"
              placeholder="Repetez le mot de passe"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn-signup" :disabled="loading">
          <span v-if="loading">Inscription...</span>
          <span v-else>Creer mon compte</span>
        </button>
      </form>

      <form v-else @submit.prevent="saveProfile">
        <div class="profile-form-row">
          <div class="profile-avatar-section">
            <img :src="profilePreview" alt="" class="profile-preview" />
            <div class="form-group">
              <label for="avatar">Photo de profil</label>
              <input
                type="file"
                id="avatar"
                accept="image/*"
                @change="selectAvatar"
              />
            </div>
          </div>
          <div class="profile-fields-section">
            <div class="form-group">
              <label for="location">Ville / localisation</label>
              <input
                type="text"
                id="location"
                v-model="location"
                placeholder="Ex: Casablanca"
              />
            </div>
            <div class="form-group">
              <label for="tags">Competences</label>
              <input
                type="text"
                id="tags"
                v-model="tagsInput"
                placeholder="Ex: Frontend, UI/UX, Flask"
              />
            </div>
            <div class="tag-preview" v-if="tags.length">
              <span v-for="tag in tags" :key="tag">{{ tag }}</span>
            </div>
          </div>
        </div>
        <button type="submit" class="btn-signup" :disabled="loading">
          <span v-if="loading">Enregistrement...</span>
          <span v-else>Terminer mon profil</span>
        </button>
      </form>

      <div class="auth-footer" v-if="step === 'account'">
        Deja un compte ? <a href="login.html">Connectez-vous</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script>
      new Vue({
        el: "#app",
        data: {
          step: "account",
          createdUser: null,
          name: "",
          username: "",
          email: "",
          password: "",
          confirmPassword: "",
          avatar: "",
          location: "",
          tagsInput: "",
          loading: false,
          error: "",
          usernameTaken: false,
          emailTaken: false,
          usersCache: null,
        },
        computed: {
          tags() {
            return this.tagsInput
              .split(",")
              .map((tag) => tag.trim())
              .filter(Boolean);
          },
          profilePreview() {
            return (
              this.avatar ||
              `https://ui-avatars.com/api/?name=${encodeURIComponent(this.name || this.username || "User")}&background=f97316&color=fff`
            );
          },
          subtitle() {
            return this.step === "account"
              ? "Creez votre compte pour commencer"
              : "Ajoutez votre photo et vos competences";
          },
        },
        methods: {
          async loadUsers() {
            if (!this.usersCache) {
              try {
                this.usersCache = await window.electronAPI.getUsers();
              } catch { this.usersCache = []; }
            }
            return this.usersCache;
          },
          async checkUsername() {
            if (!this.username) { this.usernameTaken = false; return; }
            const users = await this.loadUsers();
            this.usernameTaken = users.some(
              (u) => u.username.toLowerCase() === this.username.toLowerCase()
            );
          },
          async checkEmail() {
            if (!this.email) { this.emailTaken = false; return; }
            const users = await this.loadUsers();
            this.emailTaken = users.some(
              (u) => u.email.toLowerCase() === this.email.toLowerCase()
            );
          },
          async signup() {
            if (
              !this.name ||
              !this.username ||
              !this.email ||
              !this.password ||
              !this.confirmPassword
            ) {
              this.error = "Veuillez remplir tous les champs";
              return;
            }
            if (this.password.length < 6) {
              this.error =
                "Le mot de passe doit contenir au moins 6 caracteres";
              return;
            }
            if (this.password !== this.confirmPassword) {
              this.error = "Les mots de passe ne correspondent pas";
              return;
            }
            await this.checkUsername();
            await this.checkEmail();
            if (this.usernameTaken) {
              this.error = "Ce nom d'utilisateur est deja pris";
              return;
            }
            if (this.emailTaken) {
              this.error = "Cet email est deja utilise";
              return;
            }
            this.loading = true;
            this.error = "";
            try {
              const result = await window.electronAPI.createUser({
                name: this.name,
                username: this.username,
                email: this.email,
                password: this.password,
              });
              if (result.success) {
                this.createdUser = result.user;
                this.step = "profile";
              } else {
                this.error = result.error || "Erreur lors de l'inscription";
              }
            } catch (err) {
              this.error = "Erreur de connexion au serveur";
            } finally {
              this.loading = false;
            }
          },
          selectAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
              this.avatar = reader.result;
            };
            reader.readAsDataURL(file);
          },
          async saveProfile() {
            if (!this.createdUser || !this.createdUser.id) {
              this.error = "Utilisateur introuvable";
              return;
            }
            this.loading = true;
            this.error = "";
            try {
              const result = await window.electronAPI.updateUser(
                this.createdUser.id,
                {
                  name: this.name,
                  username: this.username,
                  email: this.email,
                  avatar: this.avatar,
                  location: this.location,
                  tags: this.tags,
                },
              );
              if (result.success) {
                window.electronAPI.navigate("src/templates/dashboard.html");
              } else {
                this.error =
                  result.error || "Erreur lors de l'enregistrement du profil";
              }
            } catch (err) {
              this.error = "Erreur de connexion au serveur";
            } finally {
              this.loading = false;
            }
          },
        },
      });
    </script>
  </body>
</html>
