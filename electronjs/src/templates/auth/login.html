<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="../../assets/css/all.css" />
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../../assets/css/login.css">
</head>
<body>
    <div class="auth-container" id="app">
        <div class="auth-logo">
            <div class="logo-circle"></div>
            <h4>ProjectManager</h4>
        </div>
        <div class="auth-title">Connexion</div>
        <div class="auth-subtitle">Connectez-vous pour accéder à votre espace</div>

        <div class="error-msg" :class="{ show: error }">{{ error }}</div>

        <form @submit.prevent="login">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" v-model="username" placeholder="Entrez votre nom d'utilisateur" required />
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" v-model="password" placeholder="Entrez votre mot de passe" required />
            </div>
            <div class="remember-row">
                <input type="checkbox" id="rememberMe" v-model="rememberMe" />
                <label for="rememberMe">Se souvenir de moi</label>
            </div>
            <button type="submit" class="btn-login" :disabled="loading">
                <span v-if="loading">Connexion...</span>
                <span v-else>Se connecter</span>
            </button>
        </form>

        <div class="auth-footer">
            Pas encore de compte ? <a href="sign.html">Créer un compte</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script>
        new Vue({
            el: "#app",
            data: {
                username: "",
                password: "",
                rememberMe: true,
                loading: false,
                error: "",
            },
            methods: {
                async login() {
                    if (!this.username || !this.password) {
                        this.error = "Veuillez remplir tous les champs";
                        return;
                    }
                    this.loading = true;
                    this.error = "";
                    try {
                        const result = await window.electronAPI.login({
                            username: this.username,
                            password: this.password,
                            rememberMe: this.rememberMe,
                        });
                        if (result.success) {
                            window.electronAPI.navigate("src/templates/dashboard.html");
                        } else {
                            this.error = result.error || "Erreur de connexion";
                        }
                    } catch (err) {
                        this.error = "Erreur de connexion au serveur";
                    } finally {
                        this.loading = false;
                    }
                },
            },
        });
    </script>
</body>
</html>
