<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gestionnaire de projets</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />

    <!-- vuejs -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <!-- compos -->
    <script src="../assets/compos/tag.js"></script>
    <script src="../assets/compos/project-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/column-title.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <!-- sidebar  -->
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Tâches</h3>
            <button class="new-task clicked" @click="openNewTask">
              <i class="bi bi-plus-lg"></i> Nouvelle tâche
            </button>
          </div>
        </div>

        <div class="search-row">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" v-model="searchQuery" placeholder="Trouver des tâches..." />
          </div>
          <div class="filters">
            <span class="clicked" @click="sortBy"><i class="bi bi-funnel"></i> Trier</span>
            <span class="clicked" @click="toggleFilters"><i class="bi bi-sliders"></i> Filtres</span>
            <span class="clicked" @click="toggleView"><i class="bi bi-eye"></i> Vue</span>
          </div>
        </div>

        <div class="board">
          <div class="board-column" v-for="col in filteredColumns" :key="col.name">
            <column-title :text="col.name" :count="col.tasks.length"></column-title>

            <project-card
              v-for="(task, idx) in col.tasks"
              :key="idx"
              :title="task.title"
              :description="task.description"
              :tags="task.tags"
              :deadline="task.deadline"
              :views="task.views"
              :comments-count="task.commentsCount"
              :urls="task.urls"
              :author="task.author"
            ></project-card>
          </div>
        </div>
      </main>
    </div>

    <script>
      const statusLabels = { todo: "\u00c0 faire", in_progress: "En cours", done: "Termin\u00e9" };
      const avatars = [
        "https://i.pravatar.cc/100?img=1", "https://i.pravatar.cc/100?img=2",
        "https://i.pravatar.cc/100?img=3", "https://i.pravatar.cc/100?img=4",
        "https://i.pravatar.cc/100?img=5", "https://i.pravatar.cc/100?img=6",
        "https://i.pravatar.cc/100?img=7", "https://i.pravatar.cc/100?img=8",
      ];

      new Vue({
        el: "#app",
        data: {
          searchQuery: "",
          tasks: [],
        },
        computed: {
          columns() {
            const groups = { todo: [], in_progress: [], done: [] };
            this.tasks.forEach(t => {
              const key = groups[t.status] ? t.status : "todo";
              groups[key].push(t);
            });
            return [
              { name: "\u00c0 faire", status: "todo", tasks: groups.todo },
              { name: "En cours", status: "in_progress", tasks: groups.in_progress },
              { name: "Termin\u00e9", status: "done", tasks: groups.done },
            ];
          },
          filteredColumns() {
            const q = this.searchQuery.toLowerCase();
            if (!q) return this.columns;
            return this.columns.map(col => ({
              ...col,
              tasks: col.tasks.filter(t =>
                t.title.toLowerCase().includes(q) ||
                (t.description || "").toLowerCase().includes(q) ||
                (t.tags || []).some(tag => tag.toLowerCase().includes(q))
              ),
            }));
          },
        },
        async mounted() {
          await this.fetchTasks();
        },
        methods: {
          async fetchTasks() {
            try {
              const data = await window.electronAPI.getTasks();
              this.tasks = data.map((t, i) => ({
                title: t.title,
                description: t.description || "Aucune description",
                tags: typeof t.tags === "string" ? JSON.parse(t.tags) : t.tags || [],
                deadline: t.deadline || "N/A",
                views: t.views || 0,
                commentsCount: t.comments || 0,
                author: t.author || "Utilisateur",
                status: t.status || "todo",
                urls: [avatars[(t.authorId || 1) % avatars.length]],
              }));
            } catch (e) {
              console.error("Error fetching tasks:", e);
            }
          },
          openNewTask() { console.log("Nouvelle t\u00e2che"); },
          sortBy() { console.log("Trier"); },
          toggleFilters() { console.log("Filtres"); },
          toggleView() { console.log("Changer de vue"); },
        },
      });
    </script>
  </body>
</html>
