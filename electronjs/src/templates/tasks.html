<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gestionnaire de projets</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/task-editor.css" />

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="../assets/compos/tag.js"></script>
    <script src="../assets/compos/project-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/column-title.js"></script>
    <script src="../assets/compos/comp-logo.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
    <script src="../assets/compos/task-slide-panel.js"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Taches</h3>
            <button class="new-task clicked" @click="openNewTask">
              <i class="bi bi-plus-lg"></i> Nouvelle tache
            </button>
          </div>
        </div>

        <div class="search-row">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" v-model="searchQuery" placeholder="Trouver des taches..." />
          </div>
          <div class="filters">
            <span class="clicked" @click="sortBy"><i class="bi bi-funnel"></i> Trier</span>
            <span class="clicked" @click="showFilters = !showFilters"><i class="bi bi-sliders"></i> Filtres</span>
            <span class="clicked" @click="toggleView"><i class="bi bi-eye"></i> Vue</span>
          </div>
        </div>

        <div class="filter-panel" v-if="showFilters">
          <div class="filter-group">
            <label>Filtrer par tag</label>
            <select v-model="selectedTag">
              <option value="">Tous les tags</option>
              <option v-for="tag in availableTags" :key="tag" :value="tag">{{ tag }}</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Filtrer par utilisateur</label>
            <select v-model="selectedUser">
              <option value="">Tous les utilisateurs</option>
              <option v-for="user in users" :key="user.id" :value="user.id">{{ user.name || user.username }}</option>
            </select>
          </div>
          <button class="clear-filters" @click="clearFilters" v-if="selectedTag || selectedUser">
            <i class="bi bi-x-circle"></i> Effacer les filtres
          </button>
        </div>

        <div class="board">
          <div class="board-column" v-for="col in filteredColumns" :key="col.name">
            <column-title :text="col.name" :count="col.tasks.length"></column-title>

            <project-card
              v-for="task in col.tasks"
              :key="task.id"
              :title="task.title"
              :description="plainText(task.description)"
              :tags="task.tags"
              :deadline="task.deadline"
              :views="task.views"
              :comments-count="task.commentsCount"
              :urls="task.urls"
              :author="task.author"
              :image="task.image"
              @select="openTask(task.id)"
            ></project-card>
          </div>
        </div>
      </main>

      <div class="modal-overlay" v-if="showTaskModal" @click.self="showTaskModal = false">
        <div class="modal-card task-modal-card">
          <div class="modal-header">
            <h3>Nouvelle tache</h3>
            <button class="modal-close" @click="showTaskModal = false">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>Titre</label>
              <input type="text" v-model="newTask.title" placeholder="Titre de la tache" />
            </div>
            <div class="form-group">
              <label>Type de tache</label>
              <select v-model="newTask.taskType">
                <option value="basic">Simple</option>
                <option value="advanced">Avancee</option>
              </select>
            </div>
            <div class="form-group">
              <label>Description / Notes</label>
              <div class="editor-toolbar">
                <button type="button" title="Bold" @click="formatText('bold')"><i class="bi bi-type-bold"></i></button>
                <button type="button" title="Italic" @click="formatText('italic')"><i class="bi bi-type-italic"></i></button>
                <button type="button" title="Underline" @click="formatText('underline')"><i class="bi bi-type-underline"></i></button>
              </div>
              <div
                ref="descriptionEditor"
                class="rich-editor"
                contenteditable="true"
                @input="syncDescription"
              ></div>
            </div>
            <div class="form-row">
              <div class="form-group flex-1">
                <label>Date limite</label>
                <input type="text" v-model="newTask.deadline" placeholder="ex: 15 Juin" />
              </div>
              <div class="form-group flex-1">
                <label>Priorite</label>
                <select v-model="newTask.priority">
                  <option :value="1">Basse</option>
                  <option :value="2">Moyenne</option>
                  <option :value="3">Haute</option>
                </select>
              </div>
              <div class="form-group flex-1">
                <label>Statut</label>
                <select v-model="newTask.status">
                  <option value="todo">A faire</option>
                  <option value="in_progress">En cours</option>
                  <option value="done">Termine</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Tags (separes par des virgules)</label>
              <input type="text" v-model="newTask.tagsInput" placeholder="ex: Frontend, UI, React" />
            </div>
            <div class="form-group">
              <label>URLs (une par ligne)</label>
              <textarea v-model="newTask.urlsInput" placeholder="https://example.com" rows="2"></textarea>
            </div>
            <div class="form-group" v-if="newTask.taskType === 'advanced'">
              <label>Images</label>
              <input type="file" accept="image/*" multiple @change="selectImages" />
            </div>
            <div class="form-group" v-if="newTask.taskType === 'advanced'">
              <label>Fichiers</label>
              <input type="file" multiple @change="selectFiles" />
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn-cancel" @click="showTaskModal = false">Annuler</button>
            <button class="btn-submit" @click="createTask">Creer la tache</button>
          </div>
        </div>
      </div>

      <task-slide-panel
        :task-id="selectedTaskId"
        :visible="showTaskPanel"
        @close="showTaskPanel = false; selectedTaskId = null"
        @saved="showTaskPanel = false; selectedTaskId = null; fetchTasks()"
      ></task-slide-panel>
    </div>

    <script>
      function emptyTask() {
        return {
          title: "",
          description: "",
          taskType: "basic",
          deadline: "",
          status: "todo",
          priority: 1,
          tagsInput: "",
          urlsInput: "",
          images: [],
          files: [],
        };
      }

      new Vue({
        el: "#app",
        data: {
          searchQuery: "",
          tasks: [],
          users: [],
          showFilters: false,
          selectedTag: "",
          selectedUser: "",
          showTaskModal: false,
          showTaskPanel: false,
          selectedTaskId: null,
          newTask: emptyTask(),
        },
        computed: {
          availableTags() {
            const tags = new Set();
            this.tasks.forEach((t) => (t.tags || []).forEach((tag) => tags.add(tag)));
            return [...tags].sort();
          },
          columns() {
            const groups = { todo: [], in_progress: [], done: [] };
            this.tasks.forEach((t) => {
              const key = groups[t.status] ? t.status : "todo";
              groups[key].push(t);
            });
            return [
              { name: "A faire", status: "todo", tasks: groups.todo },
              { name: "En cours", status: "in_progress", tasks: groups.in_progress },
              { name: "Termine", status: "done", tasks: groups.done },
            ];
          },
          filteredColumns() {
            const q = this.searchQuery.toLowerCase();
            const tag = this.selectedTag;
            const userId = this.selectedUser;
            if (!q && !tag && !userId) return this.columns;
            return this.columns.map((col) => ({
              ...col,
              tasks: col.tasks.filter((t) => {
                if (
                  q &&
                  !t.title.toLowerCase().includes(q) &&
                  !this.plainText(t.description).toLowerCase().includes(q) &&
                  !(t.tags || []).some((tg) => tg.toLowerCase().includes(q))
                ) return false;
                if (tag && !(t.tags || []).includes(tag)) return false;
                if (userId && t.authorId != userId) return false;
                return true;
              }),
            }));
          },
        },
        async mounted() {
          await Promise.all([this.fetchTasks(), this.fetchUsers()]);
        },
        methods: {
          async fetchTasks() {
            try {
              const data = await window.electronAPI.getTasks();
              this.tasks = data.map((t) => ({
                id: t.id,
                title: t.title,
                description: t.description || "Aucune description",
                taskType: t.taskType || "basic",
                tags: t.tags || [],
                deadline: t.deadline || "N/A",
                views: t.views || 0,
                commentsCount: t.comments || 0,
                author: t.authorName || "Utilisateur",
                authorId: t.authorId,
                status: t.status || "todo",
                image: (t.images && t.images.length > 0) ? t.images[0] : "",
                urls: t.authorAvatar ? [t.authorAvatar] : [],
              }));
            } catch (e) {
              console.error("Error fetching tasks:", e);
            }
          },
          async fetchUsers() {
            try {
              this.users = await window.electronAPI.getUsers();
            } catch (e) {
              console.error("Error fetching users:", e);
            }
          },
          openNewTask() {
            this.showTaskModal = true;
            this.newTask = emptyTask();
            this.$nextTick(() => {
              if (this.$refs.descriptionEditor) this.$refs.descriptionEditor.innerHTML = "";
            });
          },
          syncDescription() {
            this.newTask.description = this.$refs.descriptionEditor.innerHTML;
          },
          formatText(command) {
            document.execCommand(command, false, null);
            this.syncDescription();
          },
          readFiles(fileList) {
            return Promise.all([...fileList].map((file) => new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = () => resolve({ name: file.name, type: file.type, data: reader.result });
              reader.readAsDataURL(file);
            })));
          },
          async selectImages(event) {
            const files = await this.readFiles(event.target.files);
            this.newTask.images = files.map((file) => file.data);
          },
          async selectFiles(event) {
            this.newTask.files = await this.readFiles(event.target.files);
          },
          async createTask() {
            if (!this.newTask.title.trim()) return;
            const session = await window.electronAPI.checkSession();
            const authorId = session.loggedIn && session.user ? session.user.id : null;
            const tags = this.newTask.tagsInput.split(",").map((t) => t.trim()).filter(Boolean);
            const urls = this.newTask.urlsInput.split("\n").map((u) => u.trim()).filter(Boolean);
            try {
              await window.electronAPI.createTask({
                title: this.newTask.title,
                description: this.newTask.description,
                deadline: this.newTask.deadline || "N/A",
                status: this.newTask.status,
                taskType: this.newTask.taskType,
                tags: JSON.stringify(tags),
                urls: JSON.stringify(urls),
                images: JSON.stringify(this.newTask.images),
                files: JSON.stringify(this.newTask.files),
                priority: this.newTask.priority,
                authorId,
              });
              this.showTaskModal = false;
              await this.fetchTasks();
            } catch (e) {
              console.error(e);
            }
          },
          openTask(id) {
            if (id) {
              this.selectedTaskId = id;
              this.showTaskPanel = true;
            }
          },
          plainText(html) {
            const div = document.createElement("div");
            div.innerHTML = html || "";
            return div.textContent || div.innerText || "";
          },
          clearFilters() {
            this.selectedTag = "";
            this.selectedUser = "";
          },
          sortBy() { console.log("Trier"); },
          toggleView() { console.log("Changer de vue"); },
        },
      });
    </script>
  </body>
</html>
