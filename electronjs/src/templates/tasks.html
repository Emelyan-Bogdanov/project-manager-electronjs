<!doctype html>

    <link rel="stylesheet" href="../assets/css/all.css" />

    <!-- compos -->
    <script src="../assets/compos/tag.js"></script>

    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>

  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <!-- sidebar  -->
      <aside class="sidebar">
        <!-- left menu in everything -->
        <left-big-menu> </left-big-menu>

      <!-- =========================
          MAIN CONTENT
    ========================== -->

      <main class="main-content">

        <div class="topbar">

            <button class="new-task clicked">+ Nouveau tâche</button>
          </div>
        </div>

        <div class="search-row">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" placeholder="trouver des tâches..." />

          <div class="filters">
            <span class="clicked"><i class="bi bi-funnel"></i> Sort by</span>

            <span class="clicked"><i class="bi bi-eye"></i> Show</span>

        <!-- BOARD -->
        <div class="board">
          <!-- COLUMN -->
          <div class="board-column">
            <column-title text="Category 1"></column-title>

            <project-card> </project-card>
            <project-card> </project-card>
            <project-card> </project-card>
            <project-card> </project-card>
            <project-card> </project-card>

            </project-card>
            <project-card></project-card>
            <project-card></project-card>

          <div class="board-column">

            <project-card> </project-card>

    <!-- create compos -->
    <script>
      let myapp = new Vue({
        el: "#app" /* this sould have the selector of the root element */,
        data: {},
      });
    </script>
    <script>
      setTimeout(() => {
        document.location.reload();
      }, 58500);
    </script>
    <!-- get users -->
    <script>
      fetch("http://127.0.0.1:8080/howmanyusers")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("nUser").innerHTML = data;
        })
        .catch((error) => {
          console.error(
            "Error fetching users:",
            error,
            " \nMybe you have to turn on flask server",
          );
        });
    </script>
