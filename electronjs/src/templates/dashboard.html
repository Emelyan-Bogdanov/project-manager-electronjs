<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gestionnaire de projets</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />

    <!-- vuejs -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <!-- compos -->
    <script src="../assets/compos/tag.js"></script>
    <script src="../assets/compos/project-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/column-title.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
    <script src="../assets/compos/stat-card.js"></script>
    <script src="../assets/compos/project-list-item.js"></script>
    <script src="../assets/compos/activity-item.js"></script>
    <script src="../assets/compos/team-member-item.js"></script>

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <!-- sidebar  -->
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <!-- right center main content -->
      <main class="main-content">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Tableau de bord</h3>
          </div>
          <div class="topbar-right">
            <button class="new-task clicked" @click="openNewProject">
              <i class="bi bi-plus-lg"></i> Nouveau projet
            </button>
          </div>
        </div>

        <!-- Stats cards -->
        <div class="stats-row">
          <stat-card
            v-for="stat in stats"
            :key="stat.label"
            :icon="stat.icon"
            :bg="stat.bg"
            :count="stat.count"
            :label="stat.label"
          ></stat-card>
        </div>

        <!-- Dashboard grid -->
        <div class="dashboard-grid">
          <!-- Recent Projects -->
          <div class="dash-card recent-projects">
            <div class="dash-card-header">
              <h5>Projets récents</h5>
              <a href="#" class="dash-link" @click.prevent>Voir tout</a>
            </div>
            <div class="dash-card-body">
              <project-list-item
                v-for="proj in recentProjects"
                :key="proj.name"
                :name="proj.name"
                :members="proj.members"
                :tasks="proj.tasks"
                :status="proj.status"
                :status-class="proj.statusClass"
                :color="proj.color"
              ></project-list-item>
            </div>
          </div>

          <!-- Recent Activity -->
          <div class="dash-card recent-activity">
            <div class="dash-card-header">
              <h5>Activité récente</h5>
              <a href="#" class="dash-link" @click.prevent>Voir tout</a>
            </div>
            <div class="dash-card-body">
              <activity-item
                v-for="act in activities"
                :key="act.text"
                :avatar="act.avatar"
                :user="act.user"
                :action="act.action"
                :time="act.time"
              ></activity-item>
            </div>
          </div>

          <!-- Team Overview -->
          <div class="dash-card team-overview">
            <div class="dash-card-header">
              <h5>Équipe</h5>
              <a href="#" class="dash-link" @click.prevent>Voir tout</a>
            </div>
            <div class="dash-card-body">
              <team-member-item
                v-for="member in team"
                :key="member.name"
                :avatar="member.avatar"
                :name="member.name"
                :role="member.role"
                :online="member.online"
              ></team-member-item>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- New Project Modal -->
    <div class="modal-overlay" v-if="showModal" @click.self="showModal = false">
      <div class="modal-box">
        <h4>Nouveau projet</h4>
        <div class="form-group">
          <label>Nom du projet</label>
          <input type="text" v-model="newProject.name" placeholder="Entrez le nom" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea v-model="newProject.description" placeholder="Description" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" @click="showModal = false">Annuler</button>
          <button class="btn-submit" @click="createProject" :disabled="!newProject.name">Cr\u00e9er</button>
        </div>
      </div>
    </div>

    <style>
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }
      .modal-box {
        background: white;
        border-radius: 18px;
        padding: 28px;
        width: 420px;
        max-width: 90vw;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      }
      .modal-box h4 {
        font-weight: 700;
        margin-bottom: 20px;
      }
      .modal-box .form-group {
        margin-bottom: 16px;
      }
      .modal-box label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #333;
      }
      .modal-box input,
      .modal-box textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
        font-family: inherit;
      }
      .modal-box input:focus,
      .modal-box textarea:focus {
        border-color: #ff9838;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
      }
      .btn-cancel {
        padding: 10px 20px;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        background: white;
        cursor: pointer;
      }
      .btn-submit {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #ff9838;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>

    <script>
      const avatars = [
        "https://i.pravatar.cc/100?img=1", "https://i.pravatar.cc/100?img=2",
        "https://i.pravatar.cc/100?img=3", "https://i.pravatar.cc/100?img=4",
      ];

      new Vue({
        el: "#app",
        data: {
          stats: [
            { icon: "bi-people", label: "Utilisateurs", count: 0, bg: "#e8f4fd" },
            { icon: "bi-folder", label: "Projets", count: 0, bg: "#fef3e2" },
            { icon: "bi-check2-square", label: "T\u00e2ches", count: 0, bg: "#e8faf5" },
            { icon: "bi-chat-dots", label: "Fichiers", count: 0, bg: "#f4e8fd" },
          ],
          recentProjects: [],
          activities: [],
          team: [],
          showModal: false,
          newProject: { name: "", description: "" },
        },
        async mounted() {
          await this.loadStats();
        },
        methods: {
          async loadStats() {
            try {
              const [users, tasks, workspaces, files] = await Promise.all([
                window.electronAPI.getUsers(),
                window.electronAPI.getTasks(),
                window.electronAPI.getWorkspaces(),
                window.electronAPI.getFiles(),
              ]);
              this.stats[0].count = users.length;
              this.stats[1].count = workspaces.length;
              this.stats[2].count = tasks.length;
              this.stats[3].count = files.length;

              this.recentProjects = workspaces.slice(0, 4).map((ws, i) => ({
                name: ws.name,
                members: 0,
                tasks: 0,
                status: "En cours",
                statusClass: "status-progress",
                color: ["#ff9838", "#2ecc71", "#3498db", "#e74c3c"][i],
              }));

              this.team = users.slice(0, 4).map((u, i) => ({
                name: u.username,
                role: "Membre",
                avatar: avatars[i],
                online: i % 2 === 0,
              }));

              this.activities = tasks.slice(0, 4).map(t => ({
                user: "Syst\u00e8me",
                action: `a cr\u00e9\u00e9 la t\u00e2che "${t.title}"`,
                time: "r\u00e9cemment",
                avatar: avatars[Math.floor(Math.random() * avatars.length)],
              }));
            } catch (e) {
              console.error("Error loading stats:", e);
            }
          },
          openNewProject() {
            this.showModal = true;
            this.newProject = { name: "", description: "" };
          },
          async createProject() {
            try {
              await window.electronAPI.createWorkspace({
                name: this.newProject.name,
                description: this.newProject.description || "Aucune description",
              });
              this.showModal = false;
              await this.loadStats();
            } catch (e) {
              console.error(e);
            }
          },
        },
      });
    </script>
  </body>
</html>
