<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gestionnaire de projets</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/task-editor.css" />

    <!-- vuejs -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <!-- compos -->
    <script src="../assets/compos/tag.js"></script>
    <script src="../assets/compos/project-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/column-title.js"></script>
    <script src="../assets/compos/comp-logo.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
    <script src="../assets/compos/stat-card.js"></script>
    <script src="../assets/compos/project-list-item.js"></script>
    <script src="../assets/compos/activity-item.js"></script>
    <script src="../assets/compos/team-member-item.js"></script>
    <script src="../assets/compos/task-slide-panel.js"></script>

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <!-- sidebar  -->
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <!-- right center main content -->
      <main class="main-content">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Tableau de bord</h3>
          </div>
          <div class="topbar-right">
            <button class="new-task clicked" @click="openNewProject">
              <i class="bi bi-plus-lg"></i> Nouveau projet
            </button>
          </div>
        </div>

        <!-- Stats cards -->
        <div class="stats-row">
          <stat-card
            v-for="stat in stats"
            :key="stat.label"
            :icon="stat.icon"
            :bg="stat.bg"
            :count="stat.count"
            :label="stat.label"
          ></stat-card>
        </div>

        <!-- Dashboard grid -->
        <div class="dashboard-grid">
          <!-- Recent Projects -->
          <div class="dash-card recent-projects">
            <div class="dash-card-header">
              <h5>Projets récents</h5>
              <a href="#" class="dash-link" @click.prevent="goToAllProjects">Voir tout</a>
            </div>
            <div class="dash-card-body">
              <project-list-item
                v-for="proj in recentProjects"
                :key="proj.id"
                :project-id="proj.id"
                :name="proj.name"
                :members="proj.members"
                :tasks="proj.tasks"
                :status="proj.status"
                :status-class="proj.statusClass"
                :color="proj.color"
                @select="goToProject"
              ></project-list-item>
            </div>
          </div>

          <!-- Recent Activity -->
          <div class="dash-card recent-activity">
            <div class="dash-card-header">
              <h5>Activité récente</h5>
              <a href="#" class="dash-link" @click.prevent>Voir tout</a>
            </div>
            <div class="dash-card-body">
              <activity-item
                v-for="(act, i) in activities"
                :key="i"
                :avatar="act.avatar"
                :user="act.user"
                :action="act.action"
                :time="act.time"
                :clickable="!!act.taskId"
                @select="openTask(act.taskId)"
              ></activity-item>
            </div>
          </div>

          <!-- Team Overview -->
          <div class="dash-card team-overview">
            <div class="dash-card-header">
              <h5>Équipe</h5>
              <a href="#" class="dash-link" @click.prevent>Voir tout</a>
            </div>
            <div class="dash-card-body">
              <team-member-item
                v-for="member in team"
                :key="member.name"
                :avatar="member.avatar"
                :name="member.name"
                :role="member.role"
                :online="member.online"
              ></team-member-item>
            </div>
          </div>
        </div>
      </main>

      <!-- New Project Modal -->
      <div class="modal-overlay" v-if="showModal" @click.self="showModal = false">
        <div class="modal-box dashboard-modal">
          <h4>Nouveau projet</h4>
          <div class="form-group">
            <label>Nom du projet</label>
            <input type="text" v-model="newProject.name" placeholder="Entrez le nom" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea v-model="newProject.description" placeholder="Description" rows="3"></textarea>
          </div>
          <div class="error-msg" v-if="projectError">{{ projectError }}</div>
          <div class="modal-actions">
            <button class="btn-cancel" @click="showModal = false">Annuler</button>
            <button class="btn-submit" @click="createProject" :disabled="!newProject.name || projectLoading">
              {{ projectLoading ? "Cr\u00e9ation..." : "Cr\u00e9er" }}
            </button>
          </div>
        </div>
      </div>

      <task-slide-panel
        :task-id="selectedTaskId"
        :visible="showTaskPanel"
        @close="showTaskPanel = false; selectedTaskId = null"
        @saved="showTaskPanel = false; selectedTaskId = null; loadStats()"
      ></task-slide-panel>
    </div>

    <script>
      new Vue({
        el: "#app",
        data: {
          stats: [
            { icon: "bi-people", label: "Utilisateurs", count: 0, bg: "#e8f4fd" },
            { icon: "bi-folder", label: "Projets", count: 0, bg: "#fef3e2" },
            { icon: "bi-check2-square", label: "T\u00e2ches", count: 0, bg: "#e8faf5" },
            { icon: "bi-chat-dots", label: "Fichiers", count: 0, bg: "#f4e8fd" },
          ],
          recentProjects: [],
          activities: [],
          activityLog: [],
          team: [],
          showModal: false,
          showTaskPanel: false,
          selectedTaskId: null,
          newProject: { name: "", description: "" },
          projectLoading: false,
          projectError: "",
        },
        async mounted() {
          await this.loadStats();
        },
        methods: {
          async loadStats() {
            try {
              const [users, tasks, workspaces, files] = await Promise.all([
                window.electronAPI.getUsers(),
                window.electronAPI.getTasks(),
                window.electronAPI.getWorkspaces(),
                window.electronAPI.getFiles(),
              ]);
              this.stats[0].count = users.length;
              this.stats[1].count = workspaces.length;
              this.stats[2].count = tasks.length;
              this.stats[3].count = files.length;

              this.recentProjects = workspaces.slice(0, 4).map((ws, i) => ({
                id: ws.id,
                name: ws.name,
                members: 0,
                tasks: 0,
                status: "En cours",
                statusClass: "status-progress",
                color: ["#ff9838", "#2ecc71", "#3498db", "#e74c3c"][i],
              }));

              this.team = users.slice(0, 4).map((u) => ({
                name: u.name || u.username,
                role: "Membre",
                avatar: u.avatar || "",
              }));

              const taskActivities = tasks.slice(0, 4).map(t => ({
                taskId: t.id,
                user: t.authorName || "Utilisateur",
                action: `a cr\u00e9\u00e9 la t\u00e2che "${t.title}"`,
                time: "r\u00e9cemment",
                avatar: t.authorAvatar || "",
              }));
              this.activities = [...this.activityLog, ...taskActivities].slice(0, 8);
            } catch (e) {
              console.error("Error loading stats:", e);
            }
          },
          openNewProject() {
            this.newProject = { name: "", description: "" };
            this.projectError = "";
            this.showModal = true;
          },
          async createProject() {
            this.projectError = "";
            this.projectLoading = true;
            try {
              const result = await window.electronAPI.createWorkspace({
                name: this.newProject.name,
                description: this.newProject.description || "Aucune description",
              });
              if (result && result.error) {
                this.projectError = result.error;
                return;
              }
              this.activityLog.unshift({
                user: "Vous",
                action: `a cr\u00e9\u00e9 le projet "${this.newProject.name}"`,
                time: "\u00e0 l'instant",
                avatar: "",
              });
              this.showModal = false;
              await this.loadStats();
            } catch (e) {
              this.projectError = "Erreur de connexion au serveur";
              console.error(e);
            } finally {
              this.projectLoading = false;
            }
          },
          goToProject(id) {
            if (id) {
              window.electronAPI.navigate(`workspace.html?id=${id}`);
            }
          },
          goToAllProjects() {
            window.electronAPI.navigate("projects.html");
          },
          openTask(id) {
            if (id) {
              this.selectedTaskId = id;
              this.showTaskPanel = true;
            }
          },
        },
      });
    </script>
  </body>
</html>
