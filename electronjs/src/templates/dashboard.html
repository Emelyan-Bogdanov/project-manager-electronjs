<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gestionnaire de projets</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/task-editor.css" />

    <!-- vuejs -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <!-- compos -->
    <script src="../assets/compos/tag.js"></script>
    <script src="../assets/compos/project-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/column-title.js"></script>
    <script src="../assets/compos/comp-logo.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
    <script src="../assets/compos/stat-card.js"></script>
    <script src="../assets/compos/project-list-item.js"></script>
    <script src="../assets/compos/activity-item.js"></script>
    <script src="../assets/compos/team-member-item.js"></script>
    <script src="../assets/compos/task-slide-panel.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <!-- sidebar  -->
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <!-- right center main content -->
      <main class="main-content">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Tableau de bord</h3>
          </div>
          <div class="topbar-right">
            <button class="new-task clicked" @click="openNewProject">
              <i class="bi bi-plus-lg"></i> Nouveau projet
            </button>
          </div>
        </div>

        <!-- Stats cards -->
        <div class="stats-row">
          <stat-card
            v-for="stat in stats"
            :key="stat.label"
            :icon="stat.icon"
            :bg="stat.bg"
            :count="stat.count"
            :label="stat.label"
          ></stat-card>
        </div>

        <!-- Charts Row -->
        <div class="charts-row" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
          <div class="chart-card" style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);height:260px;position:relative;">
            <h6 style="margin:0 0 14px;font-size:14px;color:#1d2340;font-weight:600;">
              <i class="bi bi-graph-up" style="color:#ff9838;margin-right:6px;"></i> Evolution des taches
            </h6>
            <div style="height:190px;"><canvas id="taskEvolutionChart"></canvas></div>
          </div>
          <div class="chart-card" style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);height:260px;position:relative;">
            <h6 style="margin:0 0 14px;font-size:14px;color:#1d2340;font-weight:600;">
              <i class="bi bi-bar-chart" style="color:#ff9838;margin-right:6px;"></i> Taches par statut
            </h6>
            <div style="height:190px;"><canvas id="taskStatusChart"></canvas></div>
          </div>
        </div>

        <!-- Dashboard grid -->
        <div class="dashboard-grid">
          <!-- Recent Projects -->
          <div class="dash-card recent-projects">
            <div class="dash-card-header">
              <h5>Projets récents</h5>
              <a href="#" class="dash-link" @click.prevent="goToAllProjects">Voir tout</a>
            </div>
            <div class="dash-card-body">
              <project-list-item
                v-for="proj in recentProjects"
                :key="proj.id"
                :project-id="proj.id"
                :name="proj.name"
                :members="proj.members"
                :tasks="proj.tasks"
                :status="proj.status"
                :status-class="proj.statusClass"
                :color="proj.color"
                @select="goToProject"
              ></project-list-item>
            </div>
          </div>

          <!-- Recent Activity -->
          <div class="dash-card recent-activity">
            <div class="dash-card-header">
              <h5>Activité récente</h5>
              <a href="#" class="dash-link" @click.prevent="showAllActivity">Voir tout</a>
            </div>
            <div class="dash-card-body">
              <activity-item
                v-for="(act, i) in activities"
                :key="i"
                :avatar="act.avatar"
                :user="act.user"
                :action="act.action"
                :time="act.time"
                :clickable="!!act.taskId"
                @select="openTask(act.taskId)"
              ></activity-item>
            </div>
          </div>

          <!-- Team Overview -->
          <div class="dash-card team-overview">
            <div class="dash-card-header">
              <h5>Équipe</h5>
              <a href="#" class="dash-link" @click.prevent="showAllMembers">Voir tout</a>
            </div>
            <div class="dash-card-body">
              <team-member-item
                v-for="member in team"
                :key="member.name"
                :avatar="member.avatar"
                :name="member.name"
                :role="member.role"
                :online="member.online"
              ></team-member-item>
            </div>
          </div>
        </div>
      </main>

      <!-- New Project Modal -->
      <div class="modal-overlay" v-if="showModal" @click.self="showModal = false">
        <div class="modal-box dashboard-modal">
          <h4>Nouveau projet</h4>
          <div class="modal-form-row">
            <div class="form-group">
              <label>Nom du projet</label>
              <input type="text" v-model="newProject.name" placeholder="Entrez le nom" />
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea v-model="newProject.description" placeholder="Description" rows="3"></textarea>
            </div>
          </div>
          <div class="error-msg" v-if="projectError">{{ projectError }}</div>
          <div class="modal-actions">
            <button class="btn-cancel" @click="showModal = false">Annuler</button>
            <button class="btn-submit" @click="createProject" :disabled="!newProject.name || projectLoading">
              {{ projectLoading ? "Cr\u00e9ation..." : "Cr\u00e9er" }}
            </button>
          </div>
        </div>
      </div>

      <task-slide-panel
        :task-id="selectedTaskId"
        :visible="showTaskPanel"
        @close="showTaskPanel = false; selectedTaskId = null"
        @saved="showTaskPanel = false; selectedTaskId = null; loadStats()"
      ></task-slide-panel>
    </div>

    <script>
      new Vue({
        el: "#app",
        data: {
          stats: [
            { icon: "bi-people", label: "Utilisateurs", count: 0, bg: "#e8f4fd" },
            { icon: "bi-folder", label: "Projets", count: 0, bg: "#fef3e2" },
            { icon: "bi-check2-square", label: "T\u00e2ches", count: 0, bg: "#e8faf5" },
            { icon: "bi-chat-dots", label: "Fichiers", count: 0, bg: "#f4e8fd" },
            { icon: "bi-person-check", label: "Mes t\u00e2ches", count: 0, bg: "#fef9e7" },
            { icon: "bi-check-circle", label: "Termin\u00e9es", count: 0, bg: "#e8faf5" },
            { icon: "bi-person-badge", label: "Assign\u00e9es", count: 0, bg: "#f0e6ff" },
            { icon: "bi-bar-chart", label: "T\u00e2ches/projet", count: 0, bg: "#fff5e6" },
          ],
          recentProjects: [],
          activities: [],
          activityLog: [],
          allActivities: [],
          team: [],
          showModal: false,
          showTaskPanel: false,
          selectedTaskId: null,
          newProject: { name: "", description: "" },
          projectLoading: false,
          projectError: "",
          session: null,
          taskEvolutionChart: null,
          taskStatusChart: null,
        },
        async mounted() {
          this.session = (await window.electronAPI.checkSession()) || { loggedIn: false };
          await this.loadStats();
        },
        methods: {
          async loadStats() {
            const userId = this.session.loggedIn && this.session.user ? this.session.user.id : null;
            const results = await Promise.allSettled([
              window.electronAPI.getUsers(),
              window.electronAPI.getTasks(),
              userId ? window.electronAPI.getMyWorkspaces(userId) : window.electronAPI.getWorkspaces(),
              window.electronAPI.getFiles(),
            ]);

            const users = results[0].status === "fulfilled" ? results[0].value : [];
            const tasks = results[1].status === "fulfilled" ? results[1].value : [];
            const workspaces = results[2].status === "fulfilled" ? results[2].value : [];
            const files = results[3].status === "fulfilled" ? results[3].value : [];
            if (results.some(r => r.status === "rejected")) {
              console.warn("Some stats failed to load, showing partial data");
            }

            this.stats[0].count = users.length;
            this.stats[1].count = workspaces.length;
            this.stats[2].count = tasks.length;
            this.stats[3].count = files.length;
            this.stats[4].count = userId ? tasks.filter(t => t.authorId === userId).length : 0;
            this.stats[5].count = tasks.filter(t => t.status === "done").length;
            this.stats[6].count = userId ? (await window.electronAPI.getAssignedTasks(userId) || []).length : 0;
            this.stats[7].count = workspaces.length > 0 ? Math.round(tasks.length / workspaces.length) : 0;

            const wsTaskCounts = {};
            const wsStatuses = {};
            for (const ws of workspaces) {
              try {
                const wsTasks = await window.electronAPI.getWorkspaceTasks(ws.id);
                wsTaskCounts[ws.id] = wsTasks.length;
                const done = wsTasks.filter(t => t.status === "done").length;
                const total = wsTasks.length;
                if (total === 0) {
                  wsStatuses[ws.id] = { label: "En cours", cls: "status-progress" };
                } else if (done === total) {
                  wsStatuses[ws.id] = { label: "Termin\u00e9", cls: "status-done" };
                } else {
                  wsStatuses[ws.id] = { label: "En cours", cls: "status-progress" };
                }
              } catch {
                wsTaskCounts[ws.id] = 0;
                wsStatuses[ws.id] = { label: "En cours", cls: "status-progress" };
              }
            }

            this.recentProjects = workspaces.slice(0, 4).map((ws, i) => ({
              id: ws.id,
              name: ws.name,
              members: 0,
              tasks: wsTaskCounts[ws.id] || 0,
              status: wsStatuses[ws.id] ? wsStatuses[ws.id].label : "En cours",
              statusClass: wsStatuses[ws.id] ? wsStatuses[ws.id].cls : "status-progress",
              color: ["#ff9838", "#2ecc71", "#3498db", "#e74c3c"][i],
            }));

            this.team = users.slice(0, 4).map((u) => ({
              name: u.name || u.username,
              role: "Membre",
              avatar: u.avatar || "",
            }));

            const taskActivities = tasks.slice(0, 4).map(t => ({
              taskId: t.id,
              user: t.authorName || "Utilisateur",
              action: `a cr\u00e9\u00e9 la t\u00e2che "${t.title}"`,
              time: "r\u00e9cemment",
              avatar: t.authorAvatar || "",
            }));
            this.allActivities = tasks.map(t => ({
              taskId: t.id,
              user: t.authorName || "Utilisateur",
              action: `a cr\u00e9\u00e9 la t\u00e2che "${t.title}"`,
              time: t.created_at || "r\u00e9cemment",
              avatar: t.authorAvatar || "",
            }));
            this.activities = [...this.activityLog, ...taskActivities].slice(0, 8);
            this.$nextTick(() => this.renderCharts(tasks));
          },
          renderCharts(tasks) {
            if (this.taskEvolutionChart) { this.taskEvolutionChart.destroy(); }
            if (this.taskStatusChart) { this.taskStatusChart.destroy(); }

            const statusCounts = { todo: 0, in_progress: 0, done: 0 };
            const dayCounts = {};
            tasks.forEach(t => {
              statusCounts[t.status] = (statusCounts[t.status] || 0) + 1;
              if (t.created_at) {
                const day = t.created_at.substring(0, 10);
                dayCounts[day] = (dayCounts[day] || 0) + 1;
              }
            });

            const days = Object.keys(dayCounts).sort();
            const counts = days.map(d => dayCounts[d]);

            const ctx1 = document.getElementById("taskEvolutionChart");
            if (ctx1) {
              this.taskEvolutionChart = new Chart(ctx1, {
                type: "line",
                data: {
                  labels: days.length ? days : ["Aucune donnee"],
                  datasets: [{
                    label: "Taches creees",
                    data: days.length ? counts : [0],
                    borderColor: "#ff9838",
                    backgroundColor: "rgba(255,152,56,0.1)",
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                  scales: {
                    x: { ticks: { font: { size: 10 } } },
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                  }
                }
              });
            }

            const ctx2 = document.getElementById("taskStatusChart");
            if (ctx2) {
              this.taskStatusChart = new Chart(ctx2, {
                type: "doughnut",
                data: {
                  labels: ["A faire", "En cours", "Termine"],
                  datasets: [{
                    data: [statusCounts.todo, statusCounts.in_progress, statusCounts.done],
                    backgroundColor: ["#f59e0b", "#3b82f6", "#22c55e"],
                    borderWidth: 0,
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { position: "bottom", labels: { font: { size: 11 }, padding: 12 } }
                  }
                }
              });
            }
          },
          openNewProject() {
            this.newProject = { name: "", description: "" };
            this.projectError = "";
            this.showModal = true;
          },
          async createProject() {
            this.projectError = "";
            this.projectLoading = true;
            try {
              const result = await window.electronAPI.createWorkspace({
                name: this.newProject.name,
                description: this.newProject.description || "Aucune description",
                ownerId: this.session.loggedIn && this.session.user ? this.session.user.id : null,
              });
              if (result && result.error) {
                this.projectError = result.error;
                return;
              }
              this.activityLog.unshift({
                user: "Vous",
                action: `a cr\u00e9\u00e9 le projet "${this.newProject.name}"`,
                time: "\u00e0 l'instant",
                avatar: "",
              });
              this.showModal = false;
              await this.loadStats();
            } catch (e) {
              this.projectError = "Erreur de connexion au serveur";
              console.error(e);
            } finally {
              this.projectLoading = false;
            }
          },
          goToProject(id) {
            if (id) {
              window.electronAPI.navigate(`workspace.html?id=${id}`);
            }
          },
          goToAllProjects() {
            window.electronAPI.navigate("projects.html");
          },
          openTask(id) {
            if (id) {
              this.selectedTaskId = id;
              this.showTaskPanel = true;
            }
          },
          showAllActivity() {
            if (this.activityLog.length > 0 || this.activities.length > 8) {
              this.activities = [...this.activityLog, ...this.allActivities].slice(0, 50);
            } else {
              window.electronAPI.navigate("tasks.html");
            }
          },
          showAllMembers() {
            window.electronAPI.navigate("allUsers.html");
          },
        },
      });
    </script>
  </body>
</html>
