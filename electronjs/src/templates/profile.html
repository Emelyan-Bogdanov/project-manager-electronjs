<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/profile.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content" style="background: #f5f6fa;">
        <button onclick="window.history.back()" class="gohome btn custom-orange d-flex align-items-center justify-content-center shadow-lg clicked">
          <i class="bi bi-arrow-left me-2"></i> Retour
        </button>

        <div class="profile-page">
          <div class="profile-header">
            <div class="profile-cover"></div>
            <div class="profile-info-row">
              <img :src="user.avatar" alt="" class="profile-avatar" />
              <div class="profile-details">
                <h1 class="profile-name">{{ user.name || user.username }}</h1>
                <p class="profile-role">{{ user.role || 'Membre' }}</p>
                <p class="profile-location" v-if="user.email">
                  <i class="bi bi-envelope"></i> {{ user.email }}
                </p>
              </div>
            </div>
          </div>

          <div class="profile-body">
            <div class="profile-section">
              <h5>Projets</h5>
              <p v-if="user.projectCount !== undefined">{{ user.projectCount }} projet(s) associ\u00e9(s)</p>
              <p v-else>Aucune information</p>
            </div>
            <div class="profile-section" v-if="user.tags && user.tags.length">
              <h5>Competences</h5>
              <p>{{ user.tags.join(", ") }}</p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/comp-logo.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
    <script>
      new Vue({
        el: "#app",
        data: {
          user: {
            name: "Chargement...",
            avatar: "",
            email: "",
            role: "",
            tags: [],
          },
        },
        async mounted() {
          const params = new URLSearchParams(window.location.search);
          const userId = params.get("user");
          if (userId) {
            try {
              const users = await window.electronAPI.getUsers();
              const u = users.find(u => String(u.id) === userId);
              if (u) {
                this.user = {
                  username: u.username,
                  name: u.name || u.username,
                  email: u.email,
                  role: "Membre",
                  avatar: u.avatar || this.getAvatarUrl(u.name || u.username),
                  tags: Array.isArray(u.tags) ? u.tags : [],
                };
              }
            } catch (e) {
              console.error(e);
            }
          } else {
            const session = await window.electronAPI.checkSession();
            if (session.loggedIn) {
              this.user = {
                ...session.user,
                avatar: session.user.avatar || this.getAvatarUrl(session.user.name || session.user.username),
                tags: Array.isArray(session.user.tags) ? session.user.tags : [],
              };
            }
          }
        },
        methods: {
          getAvatarUrl(name) {
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name || "User")}&background=f97316&color=fff`;
          },
        },
      });
    </script>
  </body>
</html>
