<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utilisateurs</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/users.css" />

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <script src="../assets/compos/user-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content users-page">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Utilisateurs</h3>
          </div>
          <div class="topbar-right">
            <button class="new-task clicked" @click="openAddUser">
              <i class="bi bi-plus-lg"></i> Ajouter
            </button>
          </div>
        </div>

        <div class="search-row">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" v-model="searchQuery" placeholder="Rechercher un utilisateur..." />
          </div>
        </div>

        <div v-if="loading" class="text-center my-5">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Chargement...</span>
          </div>
        </div>

        <div v-if="!loading" class="row g-4">
          <user-card-item
            v-for="user in filteredUsers"
            :key="user.username"
            :username="user.username"
            :tags="user.tags"
            :location="user.location"
            :profile="user.avatar"
          ></user-card-item>
        </div>
      </main>
    </div>

    <script>
      new Vue({
        el: "#app",
        data() {
          return {
            searchQuery: "",
            loading: false,
            users: [
              { username: "Alice Martin", tags: ["Design", "Frontend"], location: "Paris", avatar: "https://i.pravatar.cc/100?img=1" },
              { username: "Bob Dupont", tags: ["Backend", "DevOps"], location: "Lyon", avatar: "https://i.pravatar.cc/100?img=2" },
              { username: "Claire Bernard", tags: ["Design", "UI/UX"], location: "Marseille", avatar: "https://i.pravatar.cc/100?img=3" },
              { username: "David Petit", tags: ["Frontend", "Mobile"], location: "Toulouse", avatar: "https://i.pravatar.cc/100?img=4" },
              { username: "Emma Rousseau", tags: ["Backend", "API"], location: "Bordeaux", avatar: "https://i.pravatar.cc/100?img=5" },
              { username: "Fabien Moreau", tags: ["Fullstack", "React"], location: "Lille", avatar: "https://i.pravatar.cc/100?img=6" },
              { username: "Gaëlle Laurent", tags: ["DevOps", "Cloud"], location: "Nantes", avatar: "https://i.pravatar.cc/100?img=7" },
              { username: "Hugo Lefevre", tags: ["Mobile", "Flutter"], location: "Strasbourg", avatar: "https://i.pravatar.cc/100?img=8" },
            ],
          };
        },
        computed: {
          filteredUsers() {
            const q = this.searchQuery.toLowerCase();
            if (!q) return this.users;
            return this.users.filter((user) =>
              user.username.toLowerCase().includes(q) ||
              user.location.toLowerCase().includes(q) ||
              user.tags.some(tag => tag.toLowerCase().includes(q))
            );
          },
        },
        methods: {
          openAddUser() {
            console.log("Ajouter un utilisateur");
          },
        },
      });
    </script>
  </body>
</html>
