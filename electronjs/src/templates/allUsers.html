<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utilisateurs</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/users.css" />

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <script src="../assets/compos/user-card.js"></script>
    <script src="../assets/compos/menu-button.js"></script>
    <script src="../assets/compos/sidebar-section-header.js"></script>
    <script src="../assets/compos/sidebar-member-item.js"></script>
    <script src="../assets/compos/comp-logo.js"></script>
    <script src="../assets/compos/left-big-menu.js"></script>
  </head>
  <body>
    <div class="dashboard-wrapper d-flex" id="app">
      <aside class="sidebar">
        <left-big-menu></left-big-menu>
      </aside>

      <main class="main-content users-page">
        <div class="topbar">
          <div class="topbar-left">
            <h3 class="mb-0">Utilisateurs</h3>
          </div>
        </div>

        <div class="search-row">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" v-model="searchQuery" placeholder="Rechercher un utilisateur..." />
          </div>
        </div>

        <div v-if="loading" class="text-center my-5">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Chargement...</span>
          </div>
        </div>

        <div v-if="!loading" class="row g-4">
          <user-card-item
            v-for="user in filteredUsers"
            :key="user.id || user.username"
            :username="user.username"
            :tags="user.tags"
            :location="user.location"
            :profile="user.avatar"
          ></user-card-item>
        </div>
      </main>
    </div>

    <script>
      new Vue({
        el: "#app",
        data() {
          return {
            searchQuery: "",
            loading: true,
            users: [],
          };
        },
        computed: {
          filteredUsers() {
            const q = this.searchQuery.toLowerCase();
            if (!q) return this.users;
            return this.users.filter((user) =>
              user.username.toLowerCase().includes(q) ||
              user.location.toLowerCase().includes(q) ||
              user.tags.some(tag => tag.toLowerCase().includes(q))
            );
          },
        },
        async mounted() {
          await this.fetchUsers();
        },
        methods: {
          async fetchUsers() {
            this.loading = true;
            try {
              const data = await window.electronAPI.getUsers();
              this.users = data.map((user) => this.normalizeUser(user));
            } catch (e) {
              console.error("Error fetching users:", e);
            } finally {
              this.loading = false;
            }
          },
          normalizeUser(user) {
            const username = user.username || user.name || "Utilisateur";
            const displayName = user.name || username;
            return {
              id: user.id,
              username: displayName,
              tags: this.normalizeTags(user.tags),
              location: user.location || user.email || "",
              avatar: user.avatar || user.profile || this.getAvatarUrl(displayName),
            };
          },
          normalizeTags(tags) {
            if (Array.isArray(tags)) return tags;
            if (typeof tags === "string" && tags.trim()) {
              try {
                const parsed = JSON.parse(tags);
                return Array.isArray(parsed) ? parsed : [tags];
              } catch {
                return tags.split(",").map(tag => tag.trim()).filter(Boolean);
              }
            }
            return [];
          },
          getAvatarUrl(username) {
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=f97316&color=fff`;
          },
        },
      });
    </script>
  </body>
</html>
